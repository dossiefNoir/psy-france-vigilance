name: Build PFV APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g cordova
      - run: cordova create app com.anglemort.pfv PFV
      - run: cp psy-france-vigilance.html app/www/index.html
      - run: cd app && cordova platform add android
      - run: cd app && cordova build android
      - uses: actions/upload-artifact@v4
        with:
          name: PFV-APK
          path: app/platforms/android/app/build/outputs/apk/debug/
